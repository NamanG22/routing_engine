spring.datasource.url=jdbc:h2:mem:routing_engine;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.consumer.group-id=routing-engine-test-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.kafka.events-topic=events

app.notification.dispatcher.enabled=false
app.notification.dispatcher.poll-interval-ms=5000
app.notification.dispatcher.batch-size=10
app.notification.dispatcher.processing-delay-min-ms=10
app.notification.dispatcher.processing-delay-max-ms=20
app.notification.dispatcher.success-ratio=0.9
