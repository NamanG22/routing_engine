spring.application.name=routing-engine
server.port=9091

# Load gitignored local overrides (password, etc.) when present — no profile flag needed
spring.config.import=optional:classpath:application-local.properties

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=routing-engine-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true

app.kafka.events-topic=events
app.kafka.order-events-topic=order-events

app.notification.dispatcher.enabled=true
app.notification.dispatcher.poll-interval-ms=5000
app.notification.dispatcher.batch-size=10
app.notification.dispatcher.processing-delay-min-ms=10000
app.notification.dispatcher.processing-delay-max-ms=20000
app.notification.dispatcher.success-ratio=0.9

app.notification.retry.enabled=true
app.notification.retry.poll-interval-ms=10000
app.notification.retry.batch-size=10
app.notification.retry.delays=1m,5m,15m

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/routing_engine?serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:routing_user}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata