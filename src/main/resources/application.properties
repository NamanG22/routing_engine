spring.application.name=routing-engine
server.port=9091

# Load gitignored local overrides (password, etc.) when present — no profile flag needed
spring.config.import=optional:classpath:application-local.properties

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=routing-engine-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true

app.kafka.events-topic=events

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/routing_engine?serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:routing_user}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata